analytics-disable: true
check-update: false
vim: true
env-file: na  # ignore .env
read: [.aider.conventions]
dark-mode: true

#editor-model: openrouter/deepseek/deepseek-chat-v3-0324:free
editor-model: openrouter/mistralai/devstral-small:free

# Models
alias:
  - gemini:openrouter/google/gemini-2.5-pro-preview-03-25
  - deepseek:openrouter/deepseek/deepseek-r1:free
  - devstral:openrouter/mistralai/devstral-small:free
  - claude:openrouter/anthropic/claude-sonnet-4

# Git
git: true
gitignore: false
auto-commits: true
attribute-commit-message-author: true

# Linting and Testing
auto-lint: true
lint-cmd: make lint
auto-test: true
test-cmd: make test
